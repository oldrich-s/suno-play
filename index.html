<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Suno Player</title>

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6f42c1">

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Suno">
    <link rel="apple-touch-icon" href="icon-180.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --accent: #6f42c1;
            --accent-hover: #5a32a3;
        }

        body {
            background: #f5f5f7;
            min-height: 100vh;
            padding-bottom: env(safe-area-inset-bottom, 2rem);
            padding-top: env(safe-area-inset-top, 0);
            -webkit-user-select: none;
            user-select: none;
        }

        .player-card {
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
            padding: 2rem 1.5rem;
            text-align: center;
        }

        .album-art {
            width: 260px;
            height: 260px;
            max-width: 80vw;
            max-height: 80vw;
            border-radius: 16px;
            object-fit: cover;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
            margin: 0 auto;
            display: block;
            background: #e9ecef;
        }

        .song-title {
            font-size: 1.15rem;
            font-weight: 600;
            margin: 1rem 0 0.25rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .song-tags {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 1rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* --- Custom seek bar --- */
        .seek-container {
            padding: 0 0.25rem;
            margin-bottom: 0.5rem;
        }

        .seek-bar-track {
            position: relative;
            height: 6px;
            background: #e0e0e0;
            border-radius: 3px;
            cursor: pointer;
            touch-action: none;
        }

        .seek-bar-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 3px;
            width: 0%;
            pointer-events: none;
        }

        .seek-bar-thumb {
            position: absolute;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 14px;
            height: 14px;
            background: var(--accent);
            border-radius: 50%;
            left: 0%;
            pointer-events: none;
            transition: transform 0.1s;
        }

        .seek-bar-track:active .seek-bar-thumb {
            transform: translate(-50%, -50%) scale(1.3);
        }

        .time-display {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: #999;
            margin-bottom: 0.75rem;
        }

        /* --- Transport controls --- */
        .transport {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1.5rem;
        }

        .btn-transport {
            background: none;
            border: none;
            font-size: 1.6rem;
            color: #333;
            cursor: pointer;
            padding: 0.3rem;
            line-height: 1;
            transition: color 0.15s, transform 0.1s;
        }

        .btn-transport:hover {
            color: var(--accent);
        }

        .btn-transport:active {
            transform: scale(0.9);
        }

        .btn-play {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--accent);
            color: #fff;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(111, 66, 193, 0.35);
            transition: background 0.15s, transform 0.1s;
        }

        .btn-play:hover {
            background: var(--accent-hover);
        }

        .btn-play:active {
            transform: scale(0.93);
        }

        /* --- Sections --- */
        .section-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
            padding: 1.25rem 1.25rem;
        }

        .section-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
        }

        .inspiration-item {
            cursor: pointer;
            transition: background-color 0.15s;
            font-size: 0.9rem;
            padding: 0.6rem 0.85rem;
        }

        .inspiration-item:hover {
            background-color: #f0ebfa !important;
        }

        .inspiration-item:active {
            background-color: #e2d9f3 !important;
        }

        .tag-badge {
            cursor: pointer;
            font-weight: 500;
            font-size: 0.8rem;
            transition: background-color 0.15s;
        }

        .tag-badge:hover {
            background-color: #e2d9f3 !important;
            color: var(--accent) !important;
        }

        .status-text {
            font-size: 0.8rem;
            color: #aaa;
            text-align: center;
        }

        .toast-container {
            z-index: 9999;
        }
    </style>
</head>

<body>
    <div class="container py-3" style="max-width: 420px;">

        <!-- Player Card -->
        <div class="player-card mb-3">
            <img id="songImage" class="album-art mb-2" src="" alt="">
            <div id="songTitle" class="song-title text-muted">Loading…</div>
            <div id="songTags" class="song-tags"></div>

            <!-- Seek bar -->
            <div class="seek-container">
                <div id="seekTrack" class="seek-bar-track">
                    <div id="seekFill" class="seek-bar-fill"></div>
                    <div id="seekThumb" class="seek-bar-thumb"></div>
                </div>
            </div>
            <div class="time-display">
                <span id="timeCurrent">0:00</span>
                <span id="timeTotal">0:00</span>
            </div>

            <!-- Transport -->
            <div class="transport">
                <button id="prev" class="btn-transport" title="Previous">⏮</button>
                <button id="playPause" class="btn-play" title="Play / Pause">▶</button>
                <button id="next" class="btn-transport" title="Next">⏭</button>
            </div>
        </div>

        <div id="status" class="status-text mb-3"></div>

        <!-- Tag Inspiration -->
        <div class="section-card mb-3">
            <div class="section-title">🎲 Tag Inspiration</div>
            <p class="text-muted small mb-2">Click a combination to copy.</p>
            <div class="d-flex gap-2 mb-3">
                <button id="generateTags" class="btn btn-sm btn-outline-secondary">Generate</button>
                <button id="refreshTags" class="btn btn-sm btn-outline-secondary" style="display:none;">🔄 Refresh</button>
            </div>
            <div id="inspirationList"></div>
        </div>

        <!-- All Tags -->
        <div class="section-card mb-3">
            <div class="d-flex align-items-center justify-content-between">
                <span class="section-title mb-0">🏷️ All Tags</span>
                <button class="btn btn-sm btn-outline-secondary" type="button" data-bs-toggle="collapse" data-bs-target="#allTagsCollapse">Show / Hide</button>
            </div>
            <div class="collapse mt-2" id="allTagsCollapse">
                <div id="allSongTags" style="line-height: 2.1;"></div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="copyToast" class="toast align-items-center text-bg-success border-0" role="alert">
            <div class="d-flex">
                <div class="toast-body">✅ Copied!</div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/howler@2.2.4/dist/howler.min.js"></script>

    <script>
        // ==============================
        // Configuration
        // ==============================
        const PLAYLIST_IDS = [
            '9d83c77c-2d5e-4902-ae7a-ca5199359777',
            'dc7a675e-f64b-4e3b-9313-d8bceb5edb90'
        ];
        const CACHE_KEY = 'suno-cached-songs';
        const PLAYED_KEY = 'suno-played-song-ids';
        const MAX_TAG_LENGTH = 30;

        // ==============================
        // State
        // ==============================
        let playlist = [];
        let allSongsGlobal = [];
        let currentSongIndex = 0;
        let isPlaying = false;
        let isSeeking = false;
        let currentHowl = null;   // The active Howl instance
        let seekRafId = null;     // requestAnimationFrame ID for seek bar updates

        // ==============================
        // DOM refs
        // ==============================
        const $playPause = document.getElementById('playPause');
        const $songTitle = document.getElementById('songTitle');
        const $songTags = document.getElementById('songTags');
        const $songImage = document.getElementById('songImage');
        const $seekTrack = document.getElementById('seekTrack');
        const $seekFill = document.getElementById('seekFill');
        const $seekThumb = document.getElementById('seekThumb');
        const $timeCurrent = document.getElementById('timeCurrent');
        const $timeTotal = document.getElementById('timeTotal');
        const $status = document.getElementById('status');

        // ==============================
        // Helpers
        // ==============================
        function setStatus(text) {
            $status.textContent = text;
        }

        function formatTime(sec) {
            if (!sec || !isFinite(sec)) return '0:00';
            const m = Math.floor(sec / 60);
            const s = Math.floor(sec % 60);
            return m + ':' + (s < 10 ? '0' : '') + s;
        }

        function shuffleArray(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function parseSongFromClip(clip) {
            return {
                id: clip.clip.id,
                title: clip.clip.title,
                audio: clip.clip.audio_url,
                image: clip.clip.image_url,
                tags: (clip.clip.metadata.tags || '').toLowerCase().trim(),
            };
        }

        function showCopyToast() {
            const toastEl = document.getElementById('copyToast');
            bootstrap.Toast.getOrCreateInstance(toastEl, { delay: 1500 }).show();
        }

        function copyText(text) {
            navigator.clipboard.writeText(text).then(showCopyToast).catch(() => {
                const ta = document.createElement('textarea');
                ta.value = text;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                ta.remove();
                showCopyToast();
            });
        }

        // ==============================
        // localStorage
        // ==============================
        function loadCachedSongs() {
            try { return JSON.parse(localStorage.getItem(CACHE_KEY) || '[]'); }
            catch { return []; }
        }

        function saveSongsToCache(songs) {
            try { localStorage.setItem(CACHE_KEY, JSON.stringify(songs)); }
            catch (e) { console.warn('Cache write error:', e); }
        }

        function getPlayedIds() {
            try { return JSON.parse(localStorage.getItem(PLAYED_KEY) || '[]'); }
            catch { return []; }
        }

        function savePlayedIds(ids) {
            try { localStorage.setItem(PLAYED_KEY, JSON.stringify(ids)); }
            catch (e) { console.warn('Played IDs write error:', e); }
        }

        // ==============================
        // Deduplication
        // ==============================
        function deduplicateSongs(songs) {
            const seen = new Map();
            for (const s of songs) seen.set(s.id, s);
            return [...seen.values()];
        }

        // ==============================
        // Playlist fetching
        // ==============================
        async function fetchPlaylistSongs(playlistId) {
            const baseUrl = `https://studio-api.prod.suno.com/api/playlist/${playlistId}/?page=`;
            const songs = [];
            let page = 1;
            while (true) {
                const resp = await fetch(baseUrl + page);
                if (resp.status !== 200) break;
                const data = await resp.json();
                if (!data.playlist_clips || !data.playlist_clips.length) break;
                for (const clip of data.playlist_clips) songs.push(parseSongFromClip(clip));
                page++;
            }
            return songs;
        }

        async function fetchAllPlaylists() {
            const all = [];
            for (const id of PLAYLIST_IDS) {
                const songs = await fetchPlaylistSongs(id);
                all.push(...songs);
            }
            return all;
        }

        // ==============================
        // Seek bar — animation loop (Howler has no timeupdate)
        // ==============================
        function startSeekLoop() {
            cancelAnimationFrame(seekRafId);
            function tick() {
                if (currentHowl && currentHowl.playing() && !isSeeking) {
                    const seek = currentHowl.seek() || 0;
                    const dur = currentHowl.duration() || 0;
                    if (dur > 0) {
                        const pct = (seek / dur) * 100;
                        $seekFill.style.width = pct + '%';
                        $seekThumb.style.left = pct + '%';
                        $timeCurrent.textContent = formatTime(seek);
                        $timeTotal.textContent = formatTime(dur);
                    }
                }
                seekRafId = requestAnimationFrame(tick);
            }
            seekRafId = requestAnimationFrame(tick);
        }

        function stopSeekLoop() {
            cancelAnimationFrame(seekRafId);
            seekRafId = null;
        }

        // ==============================
        // Seek bar — user interaction
        // ==============================
        function seekFromEvent(e) {
            const rect = $seekTrack.getBoundingClientRect();
            const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
            const pct = Math.max(0, Math.min(1, x / rect.width));
            $seekFill.style.width = (pct * 100) + '%';
            $seekThumb.style.left = (pct * 100) + '%';
            return pct;
        }

        $seekTrack.addEventListener('mousedown', (e) => {
            isSeeking = true;
            seekFromEvent(e);
            const onMove = (ev) => seekFromEvent(ev);
            const onUp = (ev) => {
                const p = seekFromEvent(ev);
                if (currentHowl) {
                    const dur = currentHowl.duration() || 0;
                    if (dur > 0) currentHowl.seek(p * dur);
                }
                isSeeking = false;
                window.removeEventListener('mousemove', onMove);
                window.removeEventListener('mouseup', onUp);
            };
            window.addEventListener('mousemove', onMove);
            window.addEventListener('mouseup', onUp);
        });

        $seekTrack.addEventListener('touchstart', (e) => {
            isSeeking = true;
            seekFromEvent(e);
            const onMove = (ev) => { ev.preventDefault(); seekFromEvent(ev); };
            const onEnd = (ev) => {
                const touch = ev.changedTouches[0];
                const rect = $seekTrack.getBoundingClientRect();
                const x = touch.clientX - rect.left;
                const pct = Math.max(0, Math.min(1, x / rect.width));
                if (currentHowl) {
                    const dur = currentHowl.duration() || 0;
                    if (dur > 0) currentHowl.seek(pct * dur);
                }
                isSeeking = false;
                window.removeEventListener('touchmove', onMove);
                window.removeEventListener('touchend', onEnd);
            };
            window.addEventListener('touchmove', onMove, { passive: false });
            window.addEventListener('touchend', onEnd);
        }, { passive: true });

        // ==============================
        // Howler — create / destroy
        // ==============================
        function destroyCurrentHowl() {
            if (currentHowl) {
                currentHowl.unload();
                currentHowl = null;
            }
            stopSeekLoop();
        }

        function createHowl(url) {
            destroyCurrentHowl();

            currentHowl = new Howl({
                src: [url],
                html5: true,          // Required for streaming & iOS
                preload: true,
                volume: 1.0,
                onplay: () => {
                    isPlaying = true;
                    $playPause.textContent = '⏸';
                    startSeekLoop();
                    // Update duration once available
                    const dur = currentHowl.duration();
                    if (dur) $timeTotal.textContent = formatTime(dur);
                },
                onpause: () => {
                    $playPause.textContent = '▶';
                    stopSeekLoop();
                },
                onstop: () => {
                    $playPause.textContent = '▶';
                    stopSeekLoop();
                },
                onend: () => {
                    stopSeekLoop();
                    nextSong();
                },
                onloaderror: (_id, err) => {
                    console.error('Howler load error:', err);
                    setStatus('⚠ Load error — skipping…');
                    setTimeout(() => nextSong(), 1000);
                },
                onplayerror: (_id, err) => {
                    console.error('Howler play error:', err);
                    // Howler automatically tries to unlock audio on user gesture.
                    // If it still fails, skip after a delay.
                    setStatus('⚠ Playback error — retrying…');
                    currentHowl.once('unlock', () => {
                        currentHowl.play();
                    });
                    setTimeout(() => {
                        if (currentHowl && !currentHowl.playing()) {
                            setStatus('⚠ Playback error — skipping…');
                            nextSong();
                        }
                    }, 3000);
                },
            });

            return currentHowl;
        }

        // ==============================
        // Media Session (lock screen controls)
        // ==============================
        function updateMediaSession(song) {
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: song.title,
                    artwork: song.image ? [{ src: song.image, sizes: '512x512', type: 'image/jpeg' }] : []
                });
                navigator.mediaSession.setActionHandler('play', () => playPause());
                navigator.mediaSession.setActionHandler('pause', () => playPause());
                navigator.mediaSession.setActionHandler('nexttrack', () => nextSong());
                navigator.mediaSession.setActionHandler('previoustrack', () => prevSong());
            }
        }

        // ==============================
        // Playback controls
        // ==============================
        function updateSongInfo() {
            if (!playlist.length) return;
            const song = playlist[currentSongIndex];
            if (!song) return;

            $songTitle.textContent = song.title;
            $songTags.textContent = song.tags;
            $songImage.src = song.image || '';
            $songImage.style.visibility = song.image ? 'visible' : 'hidden';

            // Reset seek bar
            $seekFill.style.width = '0%';
            $seekThumb.style.left = '0%';
            $timeCurrent.textContent = '0:00';
            $timeTotal.textContent = '0:00';

            updateMediaSession(song);
        }

        function playPause() {
            if (!playlist.length) return;

            if (currentHowl && currentHowl.playing()) {
                // Pause
                currentHowl.pause();
                isPlaying = false;
                $playPause.textContent = '▶';
            } else if (currentHowl) {
                // Resume existing paused Howl (works from iOS lock screen)
                currentHowl.play();
                isPlaying = true;
            } else {
                // First play or no howl yet
                const song = playlist[currentSongIndex];
                if (!song) return;
                createHowl(song.audio);
                currentHowl.play();
                isPlaying = true;
                $playPause.textContent = '⏸';
                updateSongInfo();
            }
        }

        function nextSong() {
            if (!playlist.length) return;
            const cur = playlist[currentSongIndex];
            if (cur) {
                const ids = getPlayedIds();
                if (!ids.includes(cur.id)) { ids.push(cur.id); savePlayedIds(ids); }
            }
            currentSongIndex = (currentSongIndex + 1) % playlist.length;
            loadAndPlay();
        }

        function prevSong() {
            if (!playlist.length) return;
            currentSongIndex = (currentSongIndex - 1 + playlist.length) % playlist.length;
            loadAndPlay();
        }

        function loadAndPlay() {
            const song = playlist[currentSongIndex];
            if (!song) return;
            createHowl(song.audio);
            currentHowl.play();
            isPlaying = true;
            $playPause.textContent = '⏸';
            updateSongInfo();
        }

        $playPause.addEventListener('click', playPause);
        document.getElementById('next').addEventListener('click', nextSong);
        document.getElementById('prev').addEventListener('click', prevSong);

        // ==============================
        // Tags — extraction, inspiration, display
        // ==============================
        function extractCleanTags(songs) {
            const tagSet = new Set();
            for (const song of songs) {
                if (!song.tags) continue;
                const parts = song.tags.split(',').map(t => t.trim()).filter(Boolean);
                if (parts.every(p => p.length <= MAX_TAG_LENGTH)) {
                    for (const p of parts) tagSet.add(p);
                }
            }
            return [...tagSet].sort();
        }

        function generateCombinations(cleanTags, count = 5) {
            if (cleanTags.length < 3) return [];
            const combos = [];
            for (let i = 0; i < count; i++) {
                const n = 3 + Math.floor(Math.random() * 3);
                combos.push(shuffleArray(cleanTags).slice(0, Math.min(n, cleanTags.length)).join(', '));
            }
            return combos;
        }

        function renderInspirations(combos) {
            const container = document.getElementById('inspirationList');
            container.innerHTML = '';
            const list = document.createElement('div');
            list.className = 'list-group';
            for (const combo of combos) {
                const item = document.createElement('button');
                item.type = 'button';
                item.className = 'list-group-item list-group-item-action inspiration-item';
                item.textContent = combo;
                item.addEventListener('click', () => copyText(combo));
                list.appendChild(item);
            }
            container.appendChild(list);
        }

        function doGenerateTags() {
            const tags = extractCleanTags(allSongsGlobal);
            if (tags.length < 3) {
                document.getElementById('inspirationList').innerHTML =
                    '<p class="text-muted small">Not enough tags loaded yet.</p>';
                return;
            }
            renderInspirations(generateCombinations(tags, 5));
            document.getElementById('refreshTags').style.display = '';
        }

        document.getElementById('generateTags').addEventListener('click', doGenerateTags);
        document.getElementById('refreshTags').addEventListener('click', doGenerateTags);

        function buildTagsUI(songs) {
            const tags = extractCleanTags(songs);
            const container = document.getElementById('allSongTags');
            container.innerHTML = '';
            for (const tag of tags) {
                const badge = document.createElement('span');
                badge.className = 'badge bg-light text-dark border me-1 mb-1 tag-badge';
                badge.textContent = tag;
                badge.title = 'Click to copy';
                badge.addEventListener('click', () => copyText(tag));
                container.appendChild(badge);
            }
        }

        // ==============================
        // Playlist filtering
        // ==============================
        function filterPlayedSongs(songs) {
            const playedIds = getPlayedIds();
            if (!playedIds.length) return songs;
            const filtered = songs.filter(s => !playedIds.includes(s.id));
            if (!filtered.length) { savePlayedIds([]); return songs; }
            return filtered;
        }

        // ==============================
        // Init
        // ==============================
        (async () => {
            const cachedSongs = loadCachedSongs();
            const cachedIds = new Set(cachedSongs.map(s => s.id));

            if (cachedSongs.length) {
                setStatus(`${cachedSongs.length} songs from cache. Checking for new…`);
                allSongsGlobal = cachedSongs;
                playlist = shuffleArray(filterPlayedSongs(cachedSongs));
                buildTagsUI(cachedSongs);
                if (playlist.length) updateSongInfo();
            } else {
                setStatus('Loading songs…');
            }

            try {
                const fresh = await fetchAllPlaylists();
                const all = deduplicateSongs([...cachedSongs, ...fresh]);
                const newSongs = all.filter(s => !cachedIds.has(s.id));

                saveSongsToCache(all);
                allSongsGlobal = all;

                if (!cachedSongs.length) {
                    playlist = shuffleArray(filterPlayedSongs(all));
                    buildTagsUI(all);
                    if (playlist.length) updateSongInfo();
                    setStatus(`${all.length} songs loaded.`);
                } else if (newSongs.length) {
                    const playedIds = getPlayedIds();
                    const unplayedNew = newSongs.filter(s => !playedIds.includes(s.id));
                    if (unplayedNew.length) playlist.splice(currentSongIndex + 1, 0, ...shuffleArray(unplayedNew));
                    buildTagsUI(all);
                    setStatus(`${all.length} songs (${newSongs.length} new).`);
                } else {
                    setStatus(`${all.length} songs. Up to date.`);
                }
            } catch (e) {
                console.error('Fetch error:', e);
                if (cachedSongs.length) {
                    setStatus(`${cachedSongs.length} cached songs (offline).`);
                } else {
                    setStatus('Error loading songs. Refresh to try again.');
                }
            }
        })();

        // ==============================
        // Service Worker registration
        // ==============================
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(reg => {
                console.log('SW registered:', reg.scope);
            }).catch(err => {
                console.warn('SW registration failed:', err);
            });
        }
    </script>
</body>

</html>
